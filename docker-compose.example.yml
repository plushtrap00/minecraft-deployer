# Plantilla de referencia — el docker-compose.yml real NO está en git (se
# modifica en cada instalación: puertos, versión de Java, ruta de servidores...
# y versionarlo causaba que un simple `git pull` chocara en cuanto alguien
# tocaba, por ejemplo, el puerto). Dos formas de conseguir el tuyo:
#
#   1. python3 setup.py   → asistente interactivo, genera .env y este archivo
#      ya ajustados a tus respuestas (recomendado).
#   2. cp docker-compose.example.yml docker-compose.yml y edítalo a mano,
#      generando el .env aparte con: python3 set_password.py
#
# Ver README.md para la guía completa de instalación con Docker.

services:
  minecraft-deployer:
    build:
      context: .
      args:
        # Cambia aquí la versión de Java sin tocar el Dockerfile
        JAVA_VERSION: "21"
    ports:
      - "8000:8000"
      - "25565:25565"
    volumes:
      # Carpeta donde se guardan los modpacks (persistente entre reinicios)
      - servers:/servers
      # Credenciales/config de la app — genera el .env con: python set_password.py
      # (o python setup.py para el asistente completo). Sin ":ro": el panel
      # "⚙️ Configuración" de la propia app necesita poder escribir este archivo
      # para guardar cambios (contraseña, CurseForge, auto-actualización...).
      - ./.env:/app/.env
    environment:
      SERVERS_PATH: /servers
    restart: unless-stopped

volumes:
  servers:

# Para usar una carpeta del host en lugar del volumen Docker
# (útil si quieres acceder a los archivos directamente desde el SO):
#
#   volumes:
#     - ./servers-minecraft:/servers
#     - ./.env:/app/.env
#
# Y elimina el bloque "volumes: servers:" del final.
